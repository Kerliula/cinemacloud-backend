
services:
  app:
    build:
      target: base
      args:
        INSTALL_XDEBUG: "true"
    volumes:
      - ./src:/var/www/html
      - ./.env.testing:/var/www/html/.env
      - ./docker/app/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    depends_on:
      db_test:
        condition: service_healthy
    environment:
      APP_ENV: testing
      XDEBUG_MODE: "off"
      DB_HOST: db_test
      DB_PORT: 3306
    networks:
      - app-network

  db_test:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    tmpfs:
      - /var/lib/mysql:rw,noatime,size=512M
    volumes:
      - ./docker/mysql/test.cnf:/etc/mysql/conf.d/test.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s         # more breathing room
    networks:
      - app-network

networks:
  app-network:
    driver: bridge