name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: cinemacloud_test
          MARIADB_USER: cinemacloud
          MARIADB_PASSWORD: secret
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

      redis:
        image: redis:8.6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    # -------------------------------------------------------------------------
    # Setting DB_HOST here makes it a real OS environment variable.
    # PHPUnit's <env> elements default to force="false", meaning they will NOT
    # override a variable that is already present in the environment — so
    # phpunit.xml's <env name="DB_HOST" value="db_test"/> is silently ignored
    # and 127.0.0.1 (the GitHub Actions service container) is used instead.
    # -------------------------------------------------------------------------
    env:
      DB_HOST: 127.0.0.1
      REDIS_HOST: 127.0.0.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          # Keep in sync with PHP_VERSION in .env.example and the Dockerfile ARG
          php-version: "8.5"
          extensions: pdo, pdo_mysql, redis, opcache
          coverage: xdebug
          ini-values: opcache.enable=0

      # Use .env.testing (committed) as the application .env so artisan can
      # boot without any manual patching — DB_HOST is overridden above.
      - name: Prepare test environment
        run: cp .env.testing src/.env

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: src/vendor
          key: composer-${{ hashFiles('src/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        working-directory: src
        run: php artisan migrate:fresh --force

      - name: Run tests with coverage
        working-directory: src
        run: vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: src/coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Code style
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.5"
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: src/vendor
          key: composer-${{ hashFiles('src/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CS Fixer (dry-run)
        working-directory: src
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes

  # ---------------------------------------------------------------------------
  # Static analysis
  # ---------------------------------------------------------------------------
  analyse:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.5"
          extensions: pdo, pdo_mysql, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: src/vendor
          key: composer-${{ hashFiles('src/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Bootstrap environment for analysis
        working-directory: src
        run: |
          cp ../.env.example .env
          php artisan key:generate
          php artisan jwt:secret --force

      - name: Run PHPStan
        working-directory: src
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

