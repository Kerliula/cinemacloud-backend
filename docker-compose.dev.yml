services:
  app:
    build:
      target: base
      args:
        - INSTALL_XDEBUG=true
    volumes:
      - ./src:/var/www/html
      - ./docker/app/opcache-dev.ini:/usr/local/etc/php/conf.d/zz-opcache.ini
      - ./docker/app/xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug.ini
    environment:
      PHP_IDE_CONFIG: "serverName=cinemacloud"

  nginx:
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      
  mailpit:
    ports:
      - "8025:8025"