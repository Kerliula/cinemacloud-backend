services:
  app:
    build:
      target: base
      args:
        - INSTALL_XDEBUG=${INSTALL_XDEBUG:-0}
    volumes:
      - ./src:/var/www/html
      - ./docker/app/opcache-dev.ini:/usr/local/etc/php/conf.d/zz-opcache.ini
      - ./docker/app/xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug.ini
      - ./.env:/var/www/html/.env
    environment:
      PHP_IDE_CONFIG: "serverName=${APP_NAME}"
  nginx:
    volumes:
      - ./src/public:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
  mailpit:
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"

volumes:
  vendor: